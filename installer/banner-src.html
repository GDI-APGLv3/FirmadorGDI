<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 493px;
    height: 58px;
    overflow: hidden;
    font-family: 'Montserrat', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .banner {
    width: 493px;
    height: 58px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(400px 200px at 100% 50%, rgba(14,165,233,0.18), transparent 60%),
      linear-gradient(135deg, #0d1338 0%, #0a1030 100%);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
  }

  /* Dot grid — muy sutil en banner pequeño */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }

  /* Accent line bottom */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #0ea5e9 30%, #16158C 70%, transparent 100%);
  }

  /* Logo */
  .logo-img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }

  /* Divider */
  .divider {
    width: 1px;
    height: 22px;
    background: rgba(255,255,255,0.18);
    margin: 0 14px;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }

  /* Product name */
  .product-name {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: -0.03em;
    color: #ffffff;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }

  /* Dot separator */
  .dot-sep {
    width: 5px;
    height: 5px;
    border-radius: 999px;
    background: #0ea5e9;
    margin: 0 12px;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }

  /* Subtitle */
  .subtitle {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    position: relative;
    z-index: 2;
  }

  /* Right: GDI wordmark */
  .right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    position: relative;
    z-index: 2;
  }
  .wm-dot {
    width: 7px;
    height: 7px;
    border-radius: 2px;
    background: #0ea5e9;
  }
  .wm-text {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="accent-line"></div>

  <img class="logo-img" src="file:///C:/Users/santi/OneDrive/GDILatam/Operations/Comunicacion/01-Manual-Marca/GDI/logos/gdi-logo-3.png" alt="GDI">
  <div class="divider"></div>
  <span class="product-name">FirmadorGDI</span>
  <div class="dot-sep"></div>
  <span class="subtitle">Firma digital con token físico</span>

  <div class="right">
    <div class="wm-dot"></div>
    <span class="wm-text">GDI LATAM</span>
  </div>
</div>
</body>
</html>
